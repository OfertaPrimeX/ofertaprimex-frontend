<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <!-- SEO BÁSICO (dinâmico via JS) -->
  <title>Produto | OfertaPrimeX</title>
  <meta name="description" content="Confira detalhes e ofertas do produto no OfertaPrimeX">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <div class="container header-content">
    <div class="logo">
      <a href="/" style="color:#ff6a00; text-decoration:none;">
        OfertaPrime<span style="color:#222;">X</span>
      </a>
    </div>
  </div>
</header>

<section class="section">
  <div class="container" id="produto">
    <p>Carregando produto...</p>
  </div>
</section>

<footer class="footer">
  <p>© 2026 OfertaPrimeX - Todos os direitos reservados | <a href="termos.html" style="color:#ff6a00; text-decoration:none;">Termos de Uso</a> | <a href="privacidade.html" style="color:#ff6a00; text-decoration:none;">Política de Privacidade</a></p>
</footer>

<script type="module">
  import { getProductBySlug } from './js/api.js';

  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');
  const container = document.getElementById('produto');

  async function load() {
    if (!slug) {
      container.innerHTML = '<p>Produto inválido</p>';
      return;
    }

    try {
      const p = await getProductBySlug(slug);

      // SEO dinâmico
      document.title = `${p.title} | OfertaPrimeX`;
      const meta = document.querySelector('meta[name="description"]');
      if (meta) {
        meta.setAttribute(
          'content',
          `Veja preço e detalhes de ${p.title} nas melhores plataformas`
        );
      }

      container.innerHTML = `
        <div class="product-page">
          <h1>${p.title}</h1>

          <img
            src="${p.thumbnail || 'images/placeholder.png'}"
            alt="${p.title}"
            style="max-width:300px"
          >

          <p class="price">
            R$ ${Number(p.price).toFixed(2)}
          </p>

          <a
            href="/click/${p.id}"
            target="_blank"
            rel="nofollow noopener"
            class="btn"
          >
            🔗 Ver oferta
          </a>
        </div>
      `;
    } catch (e) {
      container.innerHTML = '<p>Produto não encontrado</p>';
    }
  }

  load();
</script>

<!-- Botão Voltar ao Topo -->
<button class="btn-topo" id="btnTopo" title="Voltar ao topo">↑</button>

<script>
    // Botão Voltar ao Topo
    const btnTopo = document.getElementById('btnTopo');
    
    window.addEventListener('scroll', function() {
        if (window.scrollY > 300) {
            btnTopo.classList.add('show');
        } else {
            btnTopo.classList.remove('show');
        }
    });
    
    btnTopo.addEventListener('click', function() {
        window.scrollTo({
            top: 0,
            behavior: 'smooth'
        });
    });
</script>

</body>
</html>
